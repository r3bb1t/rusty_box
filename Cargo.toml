[package]
name = "rusty_box"
version = "0.0.1"
edition = "2021"

license = "Apache-2.0"

# keep it library for early stages of development
[lib]
name = "rusty_box"
path = "src/lib.rs"


[features]
default = ["bx_full"]

std = ["tracing/std", "tempfile"]

bx_full = ["bx_little_endian", "bx_large_ram_file", "bx_phy_address_long", "bx_support_monitor_mwait", "bx_debugger", 
           "bx_support_pkeys", "bx_support_apic", "bx_configure_msrs", 
           "bx_support_handlers_chaining_speedups", "bx_support_alignment_check" ]

bx_debugger = []
bx_gdb_stub = []
bx_large_ram_file = []
bx_instrumentation = []

bx_support_alignment_check = []
bx_support_amx = []
bx_support_apic = []
bx_support_handlers_chaining_speedups = []
bx_support_memtype = []
bx_support_smp = []

bx_big_endian = []
bx_little_endian = []

bx_phy_address_long = []
bx_support_monitor_mwait = []
bx_support_pkeys = []
bx_configure_msrs = []



[dependencies]
tracing = { version = "0.1", default-features = false }

thiserror = "2.0"

byteorder = "1.5"
tempfile = { version =  "3.17", optional = true }
spin = { version = "0.10.0", default-features = false, features = ["once"] }
bitflags = "2.9.1"
